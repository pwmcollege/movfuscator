name: Docker

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

env:
  DOCKERHUB_USERNAME: pwmcollege
  IMAGE_NAME: movcc
  VERSION_FILE: .github/docker/ubuntu-versions.json

jobs:
  versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
      default_version: ${{ steps.versions.outputs.default_version }}
    steps:
      - uses: actions/checkout@v4

      - id: versions
        shell: bash
        run: |
          versions="$(jq -c . "$VERSION_FILE")"
          default_version="$(jq -r '.[-1]' "$VERSION_FILE")"
          echo "matrix={\"ubuntu_version\":$versions}" >> "$GITHUB_OUTPUT"
          echo "default_version=$default_version" >> "$GITHUB_OUTPUT"

  build:
    needs: versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.versions.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu_version }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ matrix.ubuntu_version }}
          cache-from: type=gha,scope=movcc-${{ matrix.ubuntu_version }}
          cache-to: type=gha,mode=max,scope=movcc-${{ matrix.ubuntu_version }}

  default:
    needs:
      - versions
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${DOCKERHUB_USERNAME}/${IMAGE_NAME}:latest" \
            "${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${{ needs.versions.outputs.default_version }}"
